<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>単語カードゲーム</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- KOBUN DETAIL MODAL -->
<div id="kobunModal" onclick="if(event.target===this)closeKobunModal()">
  <div class="km-box">
    <button class="km-close" onclick="closeKobunModal()">✕</button>
    <div id="kobunModalContent"></div>
  </div>
</div>

<!-- VICTORY / DEFEAT OVERLAY -->
<div id="battleOverlay">
  <div id="overlayEmoji">🏆</div>
  <div id="overlayTitle">VICTORY!</div>
  <div id="overlayMsg">ボスを倒した！</div>
  <button onclick="closeOverlay()" style="margin-top:10px;background:rgba(255,255,255,0.2);font-size:1rem;">続ける</button>
</div>

<!-- TOP RESOURCE BAR -->
<div id="topResource">
  <span class="res">💎 <span id="diamonds">0</span></span>
  <span class="res">🪙 <span id="coins">0</span></span>
  <span class="res">🔧 <span id="materials">0</span></span>
</div>

<h1>✨ 単語カードゲーム ✨</h1>

<!-- MODE TAB BAR (shared across all screens) -->
<div class="modeTabBar">
  <button id="modeTab-english" class="modeTab active-english" onclick="switchMode('english')">
    📖 英単語
  </button>
  <button id="modeTab-kobun" class="modeTab" onclick="switchMode('kobun')">
    📜 古文
  </button>
</div>

<!-- ===== GACHA ===== -->
<div id="pack" class="screen active">
  <h2 id="packTitle">🎴 英語ガチャ</h2>
  <div id="englishGachaSection">
    <button onclick="openPack()" style="background:linear-gradient(135deg,#FFD93D,#FF6B6B);font-size:1.1rem;padding:14px 28px">🎁 パックを開ける！</button>
  </div>
  <div id="kobunGachaSection" style="display:none">
    <p style="color:rgba(255,255,255,0.6);font-size:13px;margin:4px 0 10px">💎5で1回 ／ 💎50で10連</p>
    <button onclick="openKobunGacha1()" style="background:linear-gradient(135deg,#C77DFF,#4D96FF);font-size:1.1rem;padding:14px 24px">💎×5 1回引く</button>
    <button onclick="openKobunGacha10()" style="background:linear-gradient(135deg,#FF6B6B,#C77DFF);font-size:1.1rem;padding:14px 24px">💎×50 10連！</button>
  </div>
  <div id="packArea"></div>
  <div id="packResult"></div>
</div>

<!-- ===== DECK ===== -->
<div id="deck" class="screen">
  <h2 id="deckTitle">🃏 英語デッキ（5枚）</h2>
  <div class="deck-info">
    <span>⚔️ <span id="deckATK">0</span></span>
    <span>❤️ <span id="deckHP">0</span></span>
  </div>
  <div id="deckCards"></div>
</div>

<!-- ===== BATTLE ===== -->
<div id="battle" class="screen">
  <h2 id="battleTitle">⚔️ ボス戦（英語）</h2>
  <div id="bossArea">
    <div id="bossVisual">👹</div>
    <div style="text-align:center">
      <div class="hp-label">
        <span>👹 BOSS Lv.<span id="bossLevel">1</span></span>
        <span>HP <span id="bossHPNum">150</span></span>
      </div>
      <div class="hp-bar-wrap"><div class="hp-bar boss" id="bossHPBar" style="width:100%"></div></div>
    </div>
    <div style="text-align:center;margin-top:8px">
      <div class="hp-label">
        <span>🧑 あなた</span>
        <span>HP <span id="playerHPNum">0</span></span>
      </div>
      <div class="hp-bar-wrap"><div class="hp-bar player" id="playerHPBar" style="width:100%"></div></div>
    </div>
    <div class="battle-stats" style="margin-top:12px">
      <div class="stat-chip">⚔️ ATK <span id="battleATK">0</span></div>
      <div class="stat-chip">❤️ HP <span id="battleHP">0</span></div>
      <div class="stat-chip">💀 敵ATK <span id="bossATKDisplay">50</span></div>
    </div>
  </div>
  <div id="bossQuizArea"></div>
</div>

<!-- ===== VERSUS ===== -->
<div id="versus" class="screen">
  <h2 id="versusTitle">🆚 プレイヤー対戦（英語）</h2>
  <button onclick="createVersusCode()">🔑 対戦コード作成</button>
  <button onclick="loadEnemyCode()">📥 相手コード読み込み</button>
  <div id="enemyDeck"></div>
  <button onclick="startVersus()" style="background:linear-gradient(135deg,#6BCB77,#4D96FF)">⚔️ 対戦開始</button>
  <button onclick="stopVersus()" style="background:rgba(255,107,107,0.4);box-shadow:none">❌ 対戦をやめる</button>
  <div id="versusResult">
    <div>あなたHP <span id="vPlayerHP">0</span></div>
    <div>あなたATK <span id="vPlayerATK">0</span></div>
    <div>相手HP <span id="vEnemyHP">0</span></div>
    <div>相手ATK <span id="vEnemyATK">0</span></div>
    <div id="turnText"></div>
  </div>
  <div id="versusQuizArea"></div>
</div>

<!-- ===== BOOK ===== -->
<div id="book" class="screen">
  <h2>📖 カード図鑑</h2>
  <div class="collection-rate-badge">収集率 <span id="collectionRate">0</span>%</div>
  <h3>並び替え</h3>
  <button onclick="sortCollection('atk')">⚔️ ATK</button>
  <button onclick="sortCollection('hp')">❤️ HP</button>
  <button onclick="sortCollection('rarity')">⭐ レア</button>
  <h3>レアリティフィルター</h3>
  <button onclick="filterRarity('all')">全部</button>
  <button onclick="filterRarity('N')" style="background:#888">N</button>
  <button onclick="filterRarity('R')" style="background:var(--pop3)">R</button>
  <button onclick="filterRarity('SR')" style="background:var(--pop4)">SR</button>
  <button onclick="filterRarity('SSR')" style="background:linear-gradient(135deg,var(--pop1),var(--pop2))">SSR</button>
  <div id="collection"></div>
</div>

<!-- ===== CONVERT ===== -->
<div id="convert" class="screen">
  <h2>🔄 カード変換所</h2>
  <div>コイン: <span id="convertCoins">0</span>　素材: <span id="convertMaterials">0</span></div>
  <h3>変換モード</h3>
  <button onclick="setConvertMode('coin')">🪙 コインに変換</button>
  <button onclick="setConvertMode('material')">🔧 素材に変換</button>
  <div id="convertCards"></div>
</div>

<script src="game.js"></script>

<!-- Bottom Menu -->
<div class="bottomMenu">
  <button id="btnBattle"  onclick="show('battle')"><span class="icon">⚔️</span>ボス戦</button>
  <button id="btnPack"    onclick="show('pack')"><span class="icon">🎴</span>ガチャ</button>
  <button id="btnDeck"    onclick="show('deck')"><span class="icon">🃏</span>デッキ</button>
  <button id="btnBook"    onclick="show('book')"><span class="icon">📖</span>図鑑</button>
  <button id="btnConvert" onclick="show('convert')"><span class="icon">🔄</span>交換</button>
</div>

<!-- 10連アニメーション -->
<div id="gacha10Overlay" style="display:none">
  <div id="gacha10Stage"></div>
  <button id="gacha10CloseBtn" onclick="closeGacha10()" style="display:none;margin-top:16px;background:linear-gradient(135deg,#FFD93D,#FF6B6B)">結果を確認する ✨</button>
</div>

<!-- ===== DEBUG MODE: 配布時は false に変更 ===== -->
<script>const DEBUG = false;</script>

<button id="dbgDiamonds" onclick="addDiamondsDebug()" style="position:fixed;bottom:75px;right:8px;background:rgba(255,255,255,0.07);box-shadow:none;color:#444;font-size:10px;padding:4px 8px;margin:0;border-radius:8px;z-index:500">💎 DBG</button>
<button id="dbgAllCards" onclick="getAllCardsDebug()" style="position:fixed;bottom:75px;right:60px;background:rgba(255,255,255,0.07);box-shadow:none;color:#444;font-size:10px;padding:4px 8px;margin:0;border-radius:8px;z-index:500">🃏 全カード</button>

<script>
  if(!DEBUG){
    document.getElementById("dbgDiamonds").style.display = "none";
    document.getElementById("dbgAllCards").style.display = "none";
  }
</script>

</body>
</html>
